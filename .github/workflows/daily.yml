name: Update sweepstake table

# Runs automatically once a day, after the previous day's matches (US kick-offs
# finish in the early hours UTC), so it always picks up a complete day of
# results. The minute is deliberately off the top of the hour: GitHub dispatches
# scheduled jobs on a best-effort basis and the ":00" slot is the most congested,
# so an odd minute reduces (does not eliminate) queueing delay. Add more lines to
# the cron list to run more often.
on:
  schedule:
    - cron: "17 6 * * *"     # ~06:17 UTC daily (off-peak minute)
  workflow_dispatch: {}       # also lets you trigger it manually from the Actions tab

permissions:
  contents: write             # needed to commit the refreshed table.html back

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run update
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL:   ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python3 wcsweep.py update

      - name: Commit refreshed table
        run: |
          git config user.name  "sweepstake-bot"
          git config user.email "actions@users.noreply.github.com"
          git add table.html standings_state.json
          git commit -m "Update table $(date -u +%Y-%m-%d)" || echo "No changes"
          git push || echo "Nothing to push"
