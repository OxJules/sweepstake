name: Update sweepstake table

# Runs automatically once a day. The 06:00 UTC slot lands after the previous
# day's matches (US kick-offs finish in the early hours UTC), so it always picks
# up a complete day of results. Add more lines to the cron list to run more often.
on:
  schedule:
    - cron: "0 6 * * *"     # 06:00 UTC daily
  workflow_dispatch: {}       # also lets you trigger it manually from the Actions tab

permissions:
  contents: write             # needed to commit the refreshed table.html back

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run update
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL:   ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python3 wcsweep.py update

      - name: Commit refreshed table
        run: |
          git config user.name  "sweepstake-bot"
          git config user.email "actions@users.noreply.github.com"
          git add table.html
          git commit -m "Update table $(date -u +%Y-%m-%d)" || echo "No changes"
          git push || echo "Nothing to push"
